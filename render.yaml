services:
  - type: web
    name: seacommons-api-demo
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements-api.txt
    startCommand: uvicorn core.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DATABASE_URL
        value: sqlite:///./core/data/suezcanal_demo.db
      - key: MOCK
        value: true
      - key: DEMO_PUBLIC_MODE
        value: true
      - key: SUEZCANAL_AUTH
        value: false
      - key: REDIS_URL
        value: redis://localhost:6379/0

  - type: static_site
    name: seacommons-demo
    rootDir: .
    buildCommand: npm ci && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_BASE
        sync: false
