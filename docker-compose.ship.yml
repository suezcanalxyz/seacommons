version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://suez:canal@postgres:5432/suezcanal
      - OFFLINE_MODE=true
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A backend.worker worker --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://suez:canal@postgres:5432/suezcanal
      - OFFLINE_MODE=true
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  postgres:
    image: postgis/postgis:15-3.3-alpine
    environment:
      - POSTGRES_USER=suez
      - POSTGRES_PASSWORD=canal
      - POSTGRES_DB=suezcanal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  sdr_scanner:
    build:
      context: ./sdr
      dockerfile: Dockerfile
    privileged: true
    devices:
      - "/dev/bus/usb:/dev/bus/usb"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SDR_ENABLED=true
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  postgres_data:
